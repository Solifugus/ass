id: proc_means_out_001
source: hand-written
license: MIT
features:
  - data-step
  - input
  - datalines
  - proc-means
  - class
  - proc-print
expected:
  parse: pass
  execute: pass
  output: unverified
  datasets:
    stats:
      columns: [grp, _TYPE_, _FREQ_, nx, mx, sx, mn, mxx]
      rows:
        - ["a", 1, 3, 3, 20, 60, 10, 30]
        - ["b", 1, 2, 2, 150, 300, 100, 200]
priority: 2
notes: |
  PROC MEANS `output out=` writes the statistics to a dataset: the CLASS variable,
  _TYPE_, _FREQ_, then the named statistic outputs (n/mean/sum/min/max), one row
  per class group. Group a (10,20,30): n=3 mean=20 sum=60 min=10 max=30; group b
  (100,200): n=2 mean=150 sum=300 min=100 max=200. Regression for value-verifying
  PROC MEANS results and CLASS grouping (the PROC otherwise only prints).
