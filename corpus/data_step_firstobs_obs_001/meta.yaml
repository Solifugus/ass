id: data_step_firstobs_obs_001
source: hand-written
license: MIT
features:
  - data-step
  - input
  - datalines
  - dataset-options
  - set
  - where
  - proc-print
expected:
  parse: pass
  execute: pass
  output: unverified
  datasets:
    mid:
      columns: [id, age]
      rows:
        - [2, 40]
        - [3, 33]
        - [4, 19]
    mid_adult:
      columns: [id, age]
      rows:
        - [2, 40]
        - [3, 33]
priority: 2
notes: |
  Value-verifies FIRSTOBS=/OBS= dataset options. `mid` selects observations 2..4
  by position (OBS= is the last-observation number). `mid_adult` shows ordering:
  the positional window (ids 2,3,4) is taken first, then WHERE age>=30 keeps ids
  2 and 3 (id 4 age 19 is filtered out).
